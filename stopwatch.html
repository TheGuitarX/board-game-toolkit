<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stopwatch</title>
  <style>
    :root {
      --screen-blue: #1e88e5;
      --text: #ffffff;
      --card-bg: #ffffff;
      --card-text: #0c3f73;
      --panel: rgba(255, 255, 255, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: var(--screen-blue);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .page {
      width: min(100%, 420px);
      text-align: center;
      display: grid;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 5.5vw, 2rem);
      line-height: 1.2;
    }

    .display {
      margin: 0;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.2);
      padding: 14px 10px;
      font-size: clamp(2.1rem, 13vw, 3.1rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.03em;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.22);
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .action-btn {
      min-height: 52px;
      border: 0;
      border-radius: 12px;
      background: var(--card-bg);
      color: var(--card-text);
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.14);
    }

    .action-btn:disabled {
      opacity: 0.68;
      cursor: not-allowed;
    }

    .laps {
      margin: 0;
      padding: 10px 12px;
      border-radius: 14px;
      background: var(--panel);
      text-align: left;
      max-height: 240px;
      overflow-y: auto;
      list-style: none;
      font-variant-numeric: tabular-nums;
    }

    .lap-empty {
      margin: 0;
      opacity: 0.9;
      font-size: 0.96rem;
      font-weight: 600;
      text-align: center;
      padding: 10px;
    }

    .lap-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.28);
      font-size: 0.98rem;
      font-weight: 700;
    }

    .lap-item:last-child {
      border-bottom: 0;
    }

    .back-link {
      display: inline-block;
      width: 100%;
      min-height: 56px;
      border-radius: 14px;
      background: var(--card-bg);
      color: var(--card-text);
      text-decoration: none;
      font-weight: 700;
      font-size: 1.05rem;
      line-height: 56px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.14);
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Stopwatch</h1>

    <p class="display" id="display" aria-live="polite">00:00.00</p>

    <section class="buttons" aria-label="Stopwatch controls">
      <button class="action-btn" id="start-btn" type="button">Start</button>
      <button class="action-btn" id="lap-btn" type="button" disabled>Lap</button>
      <button class="action-btn" id="stop-btn" type="button" disabled>Stop</button>
      <button class="action-btn" id="reset-btn" type="button">Reset</button>
    </section>

    <ul class="laps" id="laps" aria-label="Lap times"></ul>

    <a class="back-link" href="smartphone-screen.html">Back to Main Screen</a>
  </main>

  <script>
    const display = document.getElementById("display");
    const lapsList = document.getElementById("laps");
    const startButton = document.getElementById("start-btn");
    const lapButton = document.getElementById("lap-btn");
    const stopButton = document.getElementById("stop-btn");
    const resetButton = document.getElementById("reset-btn");

    let elapsedMs = 0;
    let startTimestamp = 0;
    let running = false;
    let rafId = null;
    let lapCounter = 0;

    function formatTime(ms) {
      const totalCentiseconds = Math.floor(ms / 10);
      const centiseconds = totalCentiseconds % 100;
      const totalSeconds = Math.floor(totalCentiseconds / 100);
      const seconds = totalSeconds % 60;
      const minutes = Math.floor(totalSeconds / 60);

      const mm = String(minutes).padStart(2, "0");
      const ss = String(seconds).padStart(2, "0");
      const cs = String(centiseconds).padStart(2, "0");
      return `${mm}:${ss}.${cs}`;
    }

    function renderDisplay() {
      display.textContent = formatTime(elapsedMs);
    }

    function renderButtons() {
      startButton.disabled = running;
      stopButton.disabled = !running;
      lapButton.disabled = !running;
    }

    function renderLapEmpty() {
      lapsList.innerHTML = "";
      const empty = document.createElement("li");
      empty.className = "lap-empty";
      empty.textContent = "No laps yet";
      lapsList.appendChild(empty);
    }

    function tick(now) {
      if (!running) {
        return;
      }

      elapsedMs = now - startTimestamp;
      renderDisplay();
      rafId = window.requestAnimationFrame(tick);
    }

    function startStopwatch() {
      if (running) {
        return;
      }

      running = true;
      startTimestamp = performance.now() - elapsedMs;
      renderButtons();
      rafId = window.requestAnimationFrame(tick);
    }

    function stopStopwatch() {
      if (!running) {
        return;
      }

      running = false;
      if (rafId !== null) {
        window.cancelAnimationFrame(rafId);
        rafId = null;
      }
      elapsedMs = performance.now() - startTimestamp;
      renderDisplay();
      renderButtons();
    }

    function addLap() {
      if (!running) {
        return;
      }

      if (lapsList.firstElementChild && lapsList.firstElementChild.classList.contains("lap-empty")) {
        lapsList.innerHTML = "";
      }

      lapCounter += 1;
      const item = document.createElement("li");
      item.className = "lap-item";

      const label = document.createElement("span");
      label.textContent = `Lap ${lapCounter}`;

      const value = document.createElement("span");
      value.textContent = formatTime(elapsedMs);

      item.appendChild(label);
      item.appendChild(value);
      lapsList.appendChild(item);
      lapsList.scrollTop = lapsList.scrollHeight;
    }

    function resetStopwatch() {
      if (rafId !== null) {
        window.cancelAnimationFrame(rafId);
        rafId = null;
      }

      running = false;
      elapsedMs = 0;
      startTimestamp = 0;
      lapCounter = 0;
      renderDisplay();
      renderButtons();
      renderLapEmpty();
    }

    startButton.addEventListener("click", startStopwatch);
    stopButton.addEventListener("click", stopStopwatch);
    lapButton.addEventListener("click", addLap);
    resetButton.addEventListener("click", resetStopwatch);

    renderDisplay();
    renderButtons();
    renderLapEmpty();
  </script>
</body>
</html>
